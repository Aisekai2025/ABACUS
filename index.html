<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABACUS: CHAMPION - Visual Edition</title>
<style>
 :root { --gold: #f1c40f; --neon-green: #00ff41; --bg-dark: #0a0a0a; --crimson: #e74c3c; --sky: #3498db; }
 body { margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; }
 
 /* オープニング：背景画像を全面に見せる設定 */
 #opening { 
   height: 100vh; 
   display: flex; 
   flex-direction: column; 
   justify-content: space-between; /* 上下に配置を分ける */
   background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('abacus.png'); 
   background-size: cover; 
   background-position: center; 
   transition: opacity 1s; 
 }

 #title-container { padding-top: 60px; text-align: center; }
 #title-logo { font-size: 2.2rem; color: var(--gold); text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 10px var(--gold); font-weight: bold; }
 
 /* ボタンを画面下部にまとめる */
 .menu-area { 
   padding-bottom: 40px; 
   background: linear-gradient(transparent, rgba(0,0,0,0.8)); /* 下側を少し暗くしてボタンを見やすく */
   display: flex; 
   justify-content: center; 
 }
 .menu-container { width: 90%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
 
 .mode-btn { background: rgba(230, 126, 34, 0.9); color: #fff; border: 2px solid #fff; padding: 14px; font-size: 0.95rem; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.2s; }
 .mode-btn.how-to { background: var(--sky); grid-column: span 2; font-size: 1.1rem; }
 .mode-btn.hadou { background: var(--crimson); grid-column: span 2; }
 .mode-btn:active { transform: scale(0.95); }

 /* ゲーム画面・モーダル等のスタイル（変更なし） */
 #game-screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; }
 .top-nav { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
 .nav-btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
 #tutorial-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
 .modal-content { max-width: 500px; margin: 0 auto; }
 #question-display { font-size: 3.5rem; color: var(--gold); text-shadow: 0 0 25px var(--gold); margin: 10px 0; }
 #abacus-canvas-container { position:relative; width:350px; height:220px; background:#4a2c1a; border:8px solid #2d1b10; border-radius:10px; margin:10px auto; touch-action:none; }
 .ans-btn { background: var(--gold); color: #000; font-weight: bold; padding: 15px 60px; font-size: 1.5rem; border: none; border-radius: 50px; margin: 15px; cursor: pointer; }
 .hint-box { height:60px; text-align:center; color:#fff; font-weight:bold; padding: 0 20px; }
</style>
</head>
<body>

<div id="opening">
 <div id="title-container">
   <div id="title-logo">ABACUS:<br>CHAMPION</div>
 </div>

 <div class="menu-area">
   <div class="menu-container">
     <button class="mode-btn how-to" onclick="toggleTutorial(true)">📖 はじめてのそろばん</button>
     <button class="mode-btn" onclick="initGame('practice')">練習 (5問)</button>
     <button class="mode-btn" onclick="initGame('beginner')">初級 (10問)</button>
     <button class="mode-btn hadou" onclick="initGame('hadou')">覇道 (無限・掛け算あり)</button>
   </div>
 </div>
</div>

<div id="game-screen">
 <div class="top-nav">
   <button class="nav-btn" onclick="toggleTutorial(true)">？</button>
   <button class="nav-btn" onclick="exitToTop()">TOP</button>
 </div>
 <div id="question-display">---</div>
 <div id="abacus-canvas-container">
   <div style="position:absolute; top:65px; width:100%; height:8px; background:#2d1b10;"></div>
   <canvas id="abacus-canvas" width="350" height="220"></canvas>
 </div>
 <div id="hint-box" class="hint-box">珠を弾いて答えを作れ!</div>
 <button class="ans-btn" onclick="checkAnswer()">ご名算!</button>
</div>

<!-- 解説モーダル（中身は前回のまま） -->
<div id="tutorial-modal">
 <div class="modal-content">
   <h2 style="color:var(--gold)">そろばんの基本</h2>
   <p><strong>上の珠（五珠）</strong>: 1つで「5」<br><strong>下の珠（一珠）</strong>: 1つで「1」</p>
   <p>中心の棒に近づけると数字が加算されます。</p>
   <button style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; border-radius:8px;" onclick="toggleTutorial(false)">閉じる</button>
 </div>
</div>

<script>
// ロジック部分は前回のものをそのまま利用可能
let currentAns, beads = [], currentMode = '', qTotal = 0, qCurrent = 0;
const canvas = document.getElementById('abacus-canvas');
const ctx = canvas.getContext('2d');

function toggleTutorial(show) { document.getElementById('tutorial-modal').style.display = show ? 'block' : 'none'; }
function exitToTop() { if(confirm("トップに戻りますか？")) location.reload(); }

function initGame(mode) {
 currentMode = mode;
 qTotal = (mode === 'practice') ? 5 : (mode === 'beginner') ? 10 : Infinity;
 document.getElementById('opening').style.display = 'none';
 document.getElementById('game-screen').style.display = 'flex';
 initBeads(); drawLoop(); nextLevel();
}

function initBeads() {
 beads = [];
 for(let i=0; i<7; i++) {
   let x = 310 - i * 45; let digit = Math.pow(10, i);
   beads.push({x, y: 25, val: 5, active: false, type: 'top', digit: digit});
   for(let j=0; j<4; j++) beads.push({x, y: 100 + j * 28, val: 1, active: false, type: 'bottom', id: j, digit: digit});
 }
}

function drawLoop() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 beads.forEach(b => {
   ctx.fillStyle = b.active ? '#f1c40f' : '#d35400';
   ctx.beginPath(); ctx.ellipse(b.x, b.y, 20, 12, 0, 0, Math.PI * 2); ctx.fill();
   ctx.strokeStyle = '#2d1b10'; ctx.stroke();
 });
 requestAnimationFrame(drawLoop);
}

canvas.addEventListener('pointerdown', (e) => {
 const rect = canvas.getBoundingClientRect();
 const tx = e.clientX - rect.left; const ty = e.clientY - rect.top;
 beads.forEach(b => {
   if (Math.hypot(b.x - tx, b.y - ty) < 25) {
     b.active = !b.active;
     b.y = b.type === 'top' ? (b.active ? 50 : 25) : (b.active ? (78 + b.id * 5) : (100 + b.id * 28));
   }
 });
});

function calculateValue() { return beads.filter(b => b.active).reduce((sum, b) => sum + (b.val * b.digit), 0); }

function nextLevel() {
 let range = (currentMode === 'practice') ? 5 : 15;
 let a = Math.floor(Math.random() * range) + 1;
 let b = Math.floor(Math.random() * range) + 1;
 currentAns = a + b;
 document.getElementById('question-display').innerText = `${a} + ${b}`;
 document.getElementById('hint-box').innerText = "珠を弾いて答えを作れ!";
 beads.forEach(b => { b.active = false; b.y = (b.type === 'top') ? 25 : (100 + b.id * 28); });
}

function checkAnswer() {
 if (calculateValue() === currentAns) {
   document.getElementById('hint-box').innerText = "ご名算！";
   setTimeout(nextLevel, 1000);
 } else {
   document.getElementById('hint-box').innerText = "違いますぞ！";
 }
}
</script>
</body>
</html>
