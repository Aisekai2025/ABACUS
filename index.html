<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ABACUS: CHAMPION - Visual Edition</title>
<style>
 :root { --gold: #f1c40f; --bg-dark: #0a0a0a; --crimson: #e74c3c; --sky: #3498db; }
 body { margin: 0; background: var(--bg-dark); color: #fff; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; }
 
 /* オープニング：背景イラストを全面に表示 */
 #opening { 
   height: 100vh; 
   display: flex; 
   flex-direction: column; 
   justify-content: flex-end; /* コンテンツを一番下へ */
   background: url('abacus.png'); 
   background-size: cover; 
   background-position: center; 
   transition: opacity 1s; 
 }

 /* ボタンエリア：下側にまとめて透過背景で馴染ませる */
 .menu-area { 
   padding-bottom: 50px; /* 下端からの余白 */
   padding-top: 100px; /* グラデーションの高さ */
   background: linear-gradient(transparent, rgba(0,0,0,0.85)); /* 下に向かって暗くしてボタンを浮き立たせる */
   display: flex; 
   justify-content: center; 
   width: 100%;
 }

 .menu-container { width: 90%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
 
 .mode-btn { 
   background: rgba(230, 126, 34, 0.95); 
   color: #fff; 
   border: 2px solid #fff; 
   padding: 16px; 
   font-size: 1rem; 
   font-weight: bold; 
   cursor: pointer; 
   border-radius: 12px; 
   transition: 0.2s;
   box-shadow: 0 4px 15px rgba(0,0,0,0.5);
 }

 .mode-btn.how-to { background: var(--sky); grid-column: span 2; font-size: 1.1rem; }
 .mode-btn.hadou { background: var(--crimson); grid-column: span 2; }
 .mode-btn:active { transform: scale(0.95); }

 /* ゲーム画面・ナビゲーション */
 #game-screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; }
 .top-nav { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
 .nav-btn { background: rgba(0,0,0,0.5); border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }

 /* その他スタイル（継承） */
 #tutorial-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 25px; box-sizing: border-box; }
 .modal-content { max-width: 500px; margin: 0 auto; line-height: 1.8; }
 #question-display { font-size: 4rem; color: var(--gold); text-shadow: 0 0 25px var(--gold); margin: 10px 0; font-family: 'Courier New', monospace; }
 #abacus-canvas-container { position:relative; width:350px; height:220px; background:#4a2c1a; border:8px solid #2d1b10; border-radius:10px; margin:10px auto; touch-action:none; }
 .ans-btn { background: var(--gold); color: #000; font-weight: bold; padding: 15px 70px; font-size: 1.6rem; border: none; border-radius: 50px; margin: 20px; cursor: pointer; }
 .hint-box { height:60px; text-align:center; color:#fff; font-weight:bold; font-size: 1.1rem; }
</style>
</head>
<body>

<div id="opening">
 <!-- タイトルテキストを削除し、中央をイラストのために空けました -->
 <div class="menu-area">
   <div class="menu-container">
     <button class="mode-btn how-to" onclick="toggleTutorial(true)">📖 はじめてのそろばん</button>
     <button class="mode-btn" onclick="initGame('practice')">練習 (5問)</button>
     <button class="mode-btn" onclick="initGame('beginner')">初級 (10問)</button>
     <button class="mode-btn hadou" onclick="initGame('hadou')">覇道 (無限)</button>
   </div>
 </div>
</div>

<div id="game-screen">
 <div class="top-nav">
   <button class="nav-btn" onclick="toggleTutorial(true)">解説</button>
   <button class="nav-btn" onclick="exitToTop()">TOPへ戻る</button>
 </div>
 <div id="question-display">---</div>
 <div id="abacus-canvas-container">
   <div style="position:absolute; top:65px; width:100%; height:8px; background:#2d1b10;"></div>
   <canvas id="abacus-canvas" width="350" height="220"></canvas>
 </div>
 <div id="hint-box" class="hint-box">珠を弾いて答えを作れ!</div>
 <button class="ans-btn" onclick="checkAnswer()">ご名算!</button>
</div>

<!-- 解説モーダル -->
<div id="tutorial-modal">
 <div class="modal-content">
   <h2 style="color:var(--gold); border-bottom: 2px solid var(--gold);">そろばんの基本</h2>
   <p><strong>● 珠（たま）の数え方</strong><br>
   ・上の珠（五珠）: 1つで「5」<br>
   ・下の珠（一珠）: 1つで「1」</p>
   <p><strong>● 計算のコツ</strong><br>
   足せない時は「ペア」を考えよう！<br>
   例：3足せない → 5を足して2引く</p>
   <button style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; border-radius:8px; font-size: 1.1rem; margin-top:20px;" onclick="toggleTutorial(false)">閉じる</button>
 </div>
</div>

<script>
// ロジック部分は変更なし
let currentAns, beads = [], currentMode = '', qTotal = 0, qCurrent = 0;
const canvas = document.getElementById('abacus-canvas');
const ctx = canvas.getContext('2d');

function toggleTutorial(show) { document.getElementById('tutorial-modal').style.display = show ? 'block' : 'none'; }
function exitToTop() { if(confirm("中断してトップに戻りますか？")) location.reload(); }

function initGame(mode) {
 currentMode = mode;
 qTotal = (mode === 'practice') ? 5 : (mode === 'beginner') ? 10 : Infinity;
 document.getElementById('opening').style.display = 'none';
 document.getElementById('game-screen').style.display = 'flex';
 initBeads(); drawLoop(); nextLevel();
}

function initBeads() {
 beads = [];
 for(let i=0; i<7; i++) {
   let x = 310 - i * 45; let digit = Math.pow(10, i);
   beads.push({x, y: 25, val: 5, active: false, type: 'top', digit: digit});
   for(let j=0; j<4; j++) beads.push({x, y: 100 + j * 28, val: 1, active: false, type: 'bottom', id: j, digit: digit});
 }
}

function drawLoop() {
 ctx.clearRect(0, 0, canvas.width, canvas.height);
 beads.forEach(b => {
   ctx.fillStyle = b.active ? '#f1c40f' : '#d35400';
   ctx.beginPath(); ctx.ellipse(b.x, b.y, 20, 12, 0, 0, Math.PI * 2); ctx.fill();
   ctx.strokeStyle = '#2d1b10'; ctx.stroke();
 });
 requestAnimationFrame(drawLoop);
}

canvas.addEventListener('pointerdown', (e) => {
 const rect = canvas.getBoundingClientRect();
 const tx = e.clientX - rect.left; const ty = e.clientY - rect.top;
 beads.forEach(b => {
   if (Math.hypot(b.x - tx, b.y - ty) < 25) {
     b.active = !b.active;
     b.y = b.type === 'top' ? (b.active ? 50 : 25) : (b.active ? (78 + b.id * 5) : (100 + b.id * 28));
   }
 });
});

function calculateValue() { return beads.filter(b => b.active).reduce((sum, b) => sum + (b.val * b.digit), 0); }

function nextLevel() {
 let range = (currentMode === 'practice') ? 5 : 15;
 let a = Math.floor(Math.random() * range) + 1;
 let b = Math.floor(Math.random() * range) + 1;
 currentAns = a + b;
 document.getElementById('question-display').innerText = `${a} + ${b}`;
 document.getElementById('hint-box').innerText = "珠を弾いて答えを作れ!";
 beads.forEach(b => { b.active = false; b.y = (b.type === 'top') ? 25 : (100 + b.id * 28); });
}

function checkAnswer() {
 if (calculateValue() === currentAns) {
   document.getElementById('hint-box').innerText = "ご名算！";
   setTimeout(nextLevel, 1000);
 } else {
   document.getElementById('hint-box').innerText = "違いますぞ！";
 }
}
</script>
</body>
</html>
